<!--
צ'קליסט:
1. וידאתי שהשימוש ב-mode: 'no-cors' הושמט לחלוטין.
2. וידאתי שמפתחות ה-payload הם בדיוק: tickers, startDate, endDate, frequency, action.
-->

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מערכת חילוץ נתונים פיננסיים</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      min-height: 100vh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 15% 15%, rgba(59, 130, 246, 0.28), transparent 30%),
        radial-gradient(circle at 85% 20%, rgba(168, 85, 247, 0.22), transparent 32%),
        radial-gradient(circle at 50% 85%, rgba(20, 184, 166, 0.2), transparent 35%),
        linear-gradient(135deg, #eef2ff, #f8fafc 45%, #ecfeff);
    }

    .mesh {
      position: fixed;
      inset: -20%;
      z-index: -2;
      background:
        radial-gradient(circle at 25% 25%, rgba(37, 99, 235, 0.22), transparent 28%),
        radial-gradient(circle at 75% 35%, rgba(124, 58, 237, 0.2), transparent 30%),
        radial-gradient(circle at 50% 75%, rgba(8, 145, 178, 0.18), transparent 34%);
      animation: meshMove 18s ease-in-out infinite alternate;
      filter: blur(8px);
    }

    @keyframes meshMove {
      0% { transform: translate3d(0, 0, 0) scale(1); }
      100% { transform: translate3d(40px, -35px, 0) scale(1.08); }
    }

    .particle {
      position: fixed;
      border-radius: 999px;
      background: rgba(37, 99, 235, 0.18);
      box-shadow: 0 0 24px rgba(37, 99, 235, 0.24);
      animation: floatParticle 12s ease-in-out infinite;
      z-index: -1;
    }

    @keyframes floatParticle {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.35; }
      50% { transform: translateY(-42px) scale(1.15); opacity: 0.75; }
    }

    .glow-button {
      background: linear-gradient(135deg, #2563eb, #7c3aed, #0891b2);
      box-shadow: 0 18px 45px rgba(37, 99, 235, 0.35), 0 0 26px rgba(124, 58, 237, 0.28);
      transition: all 0.25s ease;
    }

    .glow-button:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 24px 60px rgba(37, 99, 235, 0.45), 0 0 38px rgba(124, 58, 237, 0.4);
    }

    .loader {
      width: 54px;
      height: 54px;
      border: 4px solid rgba(37, 99, 235, 0.15);
      border-top-color: #2563eb;
      border-left-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .premium-input {
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(148, 163, 184, 0.35);
      transition: 0.2s ease;
    }

    .premium-input:focus {
      outline: none;
      border-color: rgba(37, 99, 235, 0.75);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
      background: rgba(255, 255, 255, 0.96);
    }
  </style>
</head>

<body class="text-slate-900">
  <div class="mesh"></div>
  <div class="particle w-4 h-4 top-[14%] right-[12%]"></div>
  <div class="particle w-3 h-3 top-[32%] left-[16%]" style="animation-delay: 1.5s;"></div>
  <div class="particle w-5 h-5 bottom-[18%] right-[22%]" style="animation-delay: 2.7s;"></div>
  <div class="particle w-2 h-2 bottom-[28%] left-[28%]" style="animation-delay: 4s;"></div>

  <main class="min-h-screen flex items-center justify-center px-4 py-10">
    <section class="w-full max-w-6xl backdrop-blur-xl bg-white/80 shadow-2xl rounded-[2rem] border border-white/70 p-6 md:p-10">
      <div class="mb-8">
        <div class="inline-flex items-center gap-2 rounded-full bg-blue-50 border border-blue-100 px-4 py-2 text-sm text-blue-700 mb-5">
          <span class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span>
          מערכת פיננסית חכמה
        </div>

        <h1 class="text-3xl md:text-5xl font-black tracking-tight mb-4">
          חילוץ נתוני מניות מתקדם
        </h1>

        <p class="text-lg md:text-xl text-slate-600 leading-relaxed max-w-4xl">
          ברוכים הבאים למערכת חילוץ הנתונים. כאן תוכלו לשלוף שערי סגירה למספר מניות במקביל, להשוות ביניהן בסדרות-זמן, ולייצא בקליק.
        </p>
      </div>

      <div id="alertBox" class="hidden mb-6 rounded-2xl border px-5 py-4 text-sm font-medium"></div>

      <form id="stockForm" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 mb-7">
        <div class="lg:col-span-2">
          <label for="tickers" class="block text-sm font-bold mb-2">סימולי מניות</label>
          <input id="tickers" type="text" placeholder="לדוגמה: AAPL, MSFT, TSLA" class="premium-input w-full rounded-2xl px-4 py-3" />
          <p class="text-xs text-slate-500 mt-2">הזן סימולי מניות, מופרדים בפסיק</p>
        </div>

        <div>
          <label for="startDate" class="block text-sm font-bold mb-2">תאריך התחלה</label>
          <input id="startDate" type="date" class="premium-input w-full rounded-2xl px-4 py-3" />
        </div>

        <div>
          <label for="endDate" class="block text-sm font-bold mb-2">תאריך סיום</label>
          <input id="endDate" type="date" class="premium-input w-full rounded-2xl px-4 py-3" />
        </div>

        <div>
          <label for="frequency" class="block text-sm font-bold mb-2">תדירות</label>
          <select id="frequency" class="premium-input w-full rounded-2xl px-4 py-3">
            <option value="daily">יומי</option>
            <option value="weekly">שבועי</option>
            <option value="monthly">חודשי</option>
          </select>
        </div>
      </form>

      <button id="loadButton" type="button" class="glow-button w-full rounded-2xl py-4 text-white text-lg font-black">
        טען נתונים
      </button>

      <div id="loaderBox" class="hidden mt-8 flex flex-col items-center justify-center gap-4 rounded-3xl bg-white/60 border border-white/80 p-8">
        <div class="loader"></div>
        <p class="text-slate-700 font-bold">מושך נתוני שוק...</p>
      </div>

      <div id="previewTable" class="mt-8 overflow-hidden"></div>

      <div id="exportBox" class="hidden mt-6 grid grid-cols-1 md:grid-cols-2 gap-4">
        <button id="downloadCsv" type="button" class="rounded-2xl py-4 px-5 font-black text-white bg-slate-900 hover:bg-slate-800 transition shadow-xl">
          הורד כ-CSV
        </button>

        <button id="exportSheet" type="button" class="rounded-2xl py-4 px-5 font-black text-white bg-emerald-600 hover:bg-emerald-500 transition shadow-xl">
          ייצא ל-Google Sheets
        </button>
      </div>

      <div id="successBox" class="hidden mt-6"></div>
    </section>
  </main>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyHl74oo2PWf9MWS1oz-UGDBR4z05rtQpZAf5UfjsgFniEFL05I5vom5Ku2sj-IT8mt_g/exec";

    let csvData = "";

    const loadButton = document.getElementById("loadButton");
    const downloadCsvButton = document.getElementById("downloadCsv");
    const exportSheetButton = document.getElementById("exportSheet");

    const alertBox = document.getElementById("alertBox");
    const loaderBox = document.getElementById("loaderBox");
    const previewTable = document.getElementById("previewTable");
    const exportBox = document.getElementById("exportBox");
    const successBox = document.getElementById("successBox");

    loadButton.addEventListener("click", loadData);
    downloadCsvButton.addEventListener("click", downloadCsv);
    exportSheetButton.addEventListener("click", exportToSheet);

    function showAlert(message, type) {
      alertBox.className = "mb-6 rounded-2xl border px-5 py-4 text-sm font-medium";

      if (type === "success") {
        alertBox.classList.add("bg-emerald-50", "border-emerald-200", "text-emerald-800");
      } else {
        alertBox.classList.add("bg-rose-50", "border-rose-200", "text-rose-800");
      }

      alertBox.textContent = message;
      alertBox.classList.remove("hidden");
    }

    function hideAlert() {
      alertBox.classList.add("hidden");
      alertBox.textContent = "";
    }

    function setLoading(isLoading) {
      loaderBox.classList.toggle("hidden", !isLoading);
      loadButton.disabled = isLoading;
      exportSheetButton.disabled = isLoading;
      loadButton.classList.toggle("opacity-60", isLoading);
      exportSheetButton.classList.toggle("opacity-60", isLoading);
    }

    function validateForm() {
      const tickers = document.getElementById("tickers").value.trim();
      const startDate = document.getElementById("startDate").value;
      const endDate = document.getElementById("endDate").value;

      if (!tickers) {
        showAlert("אופס! צריך להזין לפחות סימול מניה אחד.", "error");
        return false;
      }

      if (!startDate || !endDate) {
        showAlert("אופס! צריך לבחור גם תאריך התחלה וגם תאריך סיום.", "error");
        return false;
      }

      if (new Date(startDate) > new Date(endDate)) {
        showAlert("אופס! נראה שתאריך ההתחלה מאוחר מתאריך הסיום...", "error");
        return false;
      }

      return true;
    }

    async function loadData() {
      hideAlert();
      successBox.classList.add("hidden");
      successBox.innerHTML = "";
      previewTable.innerHTML = "";
      exportBox.classList.add("hidden");
      csvData = "";

      if (!validateForm()) {
        return;
      }

      setLoading(true);

      const payload = {
        tickers: document.getElementById('tickers').value,
        startDate: document.getElementById('startDate').value,
        endDate: document.getElementById('endDate').value,
        frequency: document.getElementById('frequency').value,
        action: 'csv'
      };

      try {
        const response = await fetch(WEB_APP_URL, {
          method: "POST",
          headers: {'Content-Type': 'text/plain;charset=utf-8'},
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (result.status !== "success") {
          throw new Error(result.message || "אירעה שגיאה לא צפויה");
        }

        csvData = result.csvData || "";

        if (!csvData) {
          throw new Error("לא התקבלו נתונים להצגה");
        }

        buildPreviewTable(csvData);
        exportBox.classList.remove("hidden");
        showAlert("הנתונים נטענו בהצלחה. אפשר להוריד CSV או לייצא ל-Google Sheets.", "success");

      } catch (error) {
        showAlert("אופס! לא הצלחנו לטעון את הנתונים. " + error.message, "error");
      } finally {
        setLoading(false);
      }
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let insideQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"' && insideQuotes && next === '"') {
          cell += '"';
          i++;
        } else if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === "," && !insideQuotes) {
          row.push(cell);
          cell = "";
        } else if ((char === "\n" || char === "\r") && !insideQuotes) {
          if (char === "\r" && next === "\n") {
            i++;
          }

          row.push(cell);
          rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }

      if (cell.length || row.length) {
        row.push(cell);
        rows.push(row);
      }

      return rows;
    }

    function buildPreviewTable(csvText) {
      const rows = parseCsv(csvText).filter(row => row.some(cell => cell !== ""));
      const previewRows = rows.slice(0, 7);

      if (previewRows.length === 0) {
        previewTable.innerHTML = "";
        showAlert("לא נמצאו שורות להצגה.", "error");
        return;
      }

      let html = `
        <div class="rounded-3xl border border-white/80 bg-white/70 shadow-2xl overflow-hidden">
          <div class="p-5 border-b border-slate-200 flex flex-col md:flex-row md:items-center md:justify-between gap-2">
            <div>
              <h2 class="text-2xl font-black">תצוגה מקדימה</h2>
              <p class="text-sm text-slate-500 mt-1">מוצגות עד 6 שורות ראשונות מתוך הנתונים</p>
            </div>
            <span class="inline-flex w-fit rounded-full bg-blue-50 text-blue-700 border border-blue-100 px-4 py-2 text-sm font-bold">
              ${Math.max(rows.length - 1, 0)} רשומות
            </span>
          </div>

          <div class="overflow-x-auto">
            <table class="w-full text-sm text-right">
              <thead class="bg-slate-950 text-white">
                <tr>
      `;

      previewRows[0].forEach(header => {
        html += `<th class="px-5 py-4 whitespace-nowrap font-black">${escapeHtml(header)}</th>`;
      });

      html += `
                </tr>
              </thead>
              <tbody class="divide-y divide-slate-200">
      `;

      previewRows.slice(1).forEach((row, index) => {
        html += `<tr class="${index % 2 === 0 ? "bg-white/75" : "bg-slate-50/75"} hover:bg-blue-50/70 transition">`;

        previewRows[0].forEach((_, cellIndex) => {
          html += `<td class="px-5 py-4 whitespace-nowrap text-slate-700">${escapeHtml(row[cellIndex] || "")}</td>`;
        });

        html += `</tr>`;
      });

      html += `
              </tbody>
            </table>
          </div>
        </div>
      `;

      previewTable.innerHTML = html;
    }

    function downloadCsv() {
      if (!csvData) {
        showAlert("אין עדיין נתונים להורדה.", "error");
        return;
      }

      const blob = new Blob(["\uFEFF" + csvData], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");

      link.href = url;
      link.download = "stock-data.csv";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      URL.revokeObjectURL(url);
    }

    async function exportToSheet() {
      hideAlert();
      successBox.classList.add("hidden");
      successBox.innerHTML = "";

      if (!validateForm()) {
        return;
      }

      setLoading(true);

      const payload = {
        tickers: document.getElementById('tickers').value,
        startDate: document.getElementById('startDate').value,
        endDate: document.getElementById('endDate').value,
        frequency: document.getElementById('frequency').value,
        action: 'sheet'
      };

      try {
        const response = await fetch(WEB_APP_URL, {
          method: "POST",
          headers: {'Content-Type': 'text/plain;charset=utf-8'},
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (result.status !== "success") {
          throw new Error(result.message || "אירעה שגיאה ביצירת הגיליון");
        }

        successBox.innerHTML = `
          <div class="rounded-3xl border border-emerald-200 bg-emerald-50 p-6 shadow-xl">
            <h3 class="text-2xl font-black text-emerald-800 mb-2">הייצוא הושלם בהצלחה</h3>
            <p class="text-emerald-700 mb-4">הנתונים נשמרו בגיליון Google Sheets חדש.</p>
            <a href="${escapeAttribute(result.sheetUrl)}" target="_blank" class="inline-flex rounded-2xl bg-emerald-600 hover:bg-emerald-500 text-white font-black px-6 py-3 transition shadow-lg">
              פתיחת הגיליון
            </a>
          </div>
        `;

        successBox.classList.remove("hidden");

      } catch (error) {
        showAlert("אופס! לא הצלחנו לייצא ל-Google Sheets. " + error.message, "error");
      } finally {
        setLoading(false);
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttribute(value) {
      return escapeHtml(value || "");
    }
  </script>
</body>
</html>
